<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ELP Cargo — Запрос расчёта</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #222222);
            line-height: 1.5;
            padding: 16px;
            min-height: 100vh;
        }
        h1 {
            font-size: 1.3rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 4px;
        }
        .subtitle {
            text-align: center;
            font-size: 0.85rem;
            color: var(--tg-theme-hint-color, #999);
            margin-bottom: 20px;
        }

        .section-label {
            font-size: 0.82rem;
            font-weight: 600;
            color: var(--tg-theme-hint-color, #888);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin: 20px 0 8px;
        }

        /* Route presets */
        .route-presets {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 8px;
        }
        .route-btn {
            padding: 8px 14px;
            border: 1.5px solid var(--tg-theme-hint-color, #ddd);
            border-radius: 20px;
            background: transparent;
            color: var(--tg-theme-text-color, #333);
            font-size: 0.85rem;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.15s;
        }
        .route-btn.selected {
            background: var(--tg-theme-button-color, #5B8DEF);
            color: var(--tg-theme-button-text-color, #fff);
            border-color: var(--tg-theme-button-color, #5B8DEF);
        }

        /* Cargo type buttons */
        .cargo-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 8px;
        }
        .cargo-btn {
            padding: 10px 8px;
            border: 1.5px solid var(--tg-theme-hint-color, #ddd);
            border-radius: 12px;
            background: transparent;
            color: var(--tg-theme-text-color, #333);
            font-size: 0.82rem;
            cursor: pointer;
            font-family: inherit;
            text-align: center;
            transition: all 0.15s;
        }
        .cargo-btn.selected {
            background: var(--tg-theme-button-color, #5B8DEF);
            color: var(--tg-theme-button-text-color, #fff);
            border-color: var(--tg-theme-button-color, #5B8DEF);
        }

        /* Input fields */
        .input-group { margin-bottom: 14px; }
        .input-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 4px;
        }
        .input-group input {
            width: 100%;
            padding: 12px 14px;
            border: 1.5px solid var(--tg-theme-hint-color, #ddd);
            border-radius: 12px;
            background: var(--tg-theme-secondary-bg-color, #f5f5f5);
            color: var(--tg-theme-text-color, #222);
            font-size: 1rem;
            font-family: inherit;
        }
        .input-group input:focus {
            outline: none;
            border-color: var(--tg-theme-button-color, #5B8DEF);
        }
        .input-group input::placeholder {
            color: var(--tg-theme-hint-color, #aaa);
        }

        /* Route custom inputs */
        .route-custom {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }
        .route-custom input {
            flex: 1;
            padding: 10px 12px;
            border: 1.5px solid var(--tg-theme-hint-color, #ddd);
            border-radius: 12px;
            background: var(--tg-theme-secondary-bg-color, #f5f5f5);
            color: var(--tg-theme-text-color, #222);
            font-size: 0.9rem;
            font-family: inherit;
        }
        .route-custom input:focus {
            outline: none;
            border-color: var(--tg-theme-button-color, #5B8DEF);
        }
        .route-arrow {
            display: flex;
            align-items: center;
            color: var(--tg-theme-hint-color, #999);
            font-size: 1.2rem;
        }

        /* Submit */
        .submit-btn {
            width: 100%;
            padding: 14px;
            background: var(--tg-theme-button-color, #5B8DEF);
            color: var(--tg-theme-button-text-color, #fff);
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            margin-top: 20px;
        }
        .submit-btn:active { opacity: 0.85; }
        .submit-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .success-screen {
            display: none;
            text-align: center;
            padding: 60px 20px;
        }
        .success-screen .check {
            font-size: 3rem;
            margin-bottom: 12px;
        }
        .success-screen h2 {
            font-size: 1.2rem;
            margin-bottom: 8px;
        }
        .success-screen p {
            color: var(--tg-theme-hint-color, #888);
            font-size: 0.9rem;
        }
    </style>

</head>
<body>

<div id="form-screen">
    <h1>ELP Cargo</h1>
    <div class="subtitle">Запрос расчёта доставки</div>

    <div class="section-label">Маршрут</div>
    <div class="route-presets" id="route-presets">
        <button class="route-btn" onclick="selectRoute(this,'Китай → Москва')">Китай → Москва</button>
        <button class="route-btn" onclick="selectRoute(this,'Турция → Москва')">Турция → Москва</button>
        <button class="route-btn" onclick="selectRoute(this,'Германия → СПб')">Германия → СПб</button>
        <button class="route-btn" onclick="selectRoute(this,'Корея → Москва')">Корея → Москва</button>
        <button class="route-btn" onclick="selectRoute(this,'ОАЭ → Москва')">ОАЭ → Москва</button>
        <button class="route-btn" onclick="selectRoute(this,'custom')">Другой</button>
    </div>
    <div class="route-custom" id="route-custom" style="display:none;">
        <input type="text" id="route-from" placeholder="Откуда">
        <span class="route-arrow">&rarr;</span>
        <input type="text" id="route-to" placeholder="Куда">
    </div>

    <div class="section-label">Тип груза</div>
    <div class="cargo-grid" id="cargo-grid">
        <button class="cargo-btn" onclick="selectCargo(this,'Оборудование')">Оборудование</button>
        <button class="cargo-btn" onclick="selectCargo(this,'Запчасти')">Запчасти</button>
        <button class="cargo-btn" onclick="selectCargo(this,'Электроника')">Электроника</button>
        <button class="cargo-btn" onclick="selectCargo(this,'Косметика')">Косметика</button>
        <button class="cargo-btn" onclick="selectCargo(this,'Продукты')">Продукты</button>
        <button class="cargo-btn" onclick="selectCargo(this,'Другое')">Другое</button>
    </div>

    <div class="section-label">Детали</div>
    <div class="input-group">
        <label>Вес (кг)</label>
        <input type="number" id="weight" placeholder="500" min="0.1" step="0.1">
    </div>
    <div class="input-group">
        <label>Контакт (телефон или email)</label>
        <input type="text" id="contact" placeholder="+7 999 123 45 67 или email">
    </div>

    <button class="submit-btn" id="submit-btn" onclick="submitForm()">Запросить расчёт</button>
</div>

<div class="success-screen" id="success-screen">
    <div class="check">&#10003;</div>
    <h2>Заявка отправлена!</h2>
    <p>Менеджер свяжется с вами в ближайшее время для расчёта стоимости доставки.</p>
</div>

<script>
let selectedRoute = '';
let selectedCargo = '';

// Init Telegram WebApp
const tg = window.Telegram && window.Telegram.WebApp;
if (tg) {
    tg.ready();
    tg.expand();
}

function selectRoute(btn, route) {
    document.querySelectorAll('#route-presets .route-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    if (route === 'custom') {
        document.getElementById('route-custom').style.display = 'flex';
        selectedRoute = '';
    } else {
        document.getElementById('route-custom').style.display = 'none';
        selectedRoute = route;
    }
}

function selectCargo(btn, cargo) {
    document.querySelectorAll('#cargo-grid .cargo-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    selectedCargo = cargo;
}

function submitForm() {
    // Custom route
    if (!selectedRoute) {
        const from = document.getElementById('route-from').value.trim();
        const to = document.getElementById('route-to').value.trim();
        if (from && to) selectedRoute = from + ' → ' + to;
    }

    const weight = document.getElementById('weight').value;
    const contact = document.getElementById('contact').value.trim();

    if (!selectedRoute) { alert('Выберите маршрут'); return; }
    if (!selectedCargo) { alert('Выберите тип груза'); return; }
    if (!contact) { alert('Укажите контакт'); return; }

    const data = {
        source: 'tg-mini-app',
        route: selectedRoute,
        cargo_type: selectedCargo,
        weight: weight || 'не указан',
        contact: contact,
        timestamp: new Date().toISOString(),
    };

    // Send via Telegram WebApp
    if (tg && tg.sendData) {
        try {
            tg.sendData(JSON.stringify(data));
        } catch (e) {
            console.log('WebApp.sendData error:', e);
        }
    }

    // Backup: POST to API
    fetch('/api/contact', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data),
    }).catch(() => {});

    // Show success
    document.getElementById('form-screen').style.display = 'none';
    document.getElementById('success-screen').style.display = 'block';

    // Close WebApp after delay
    if (tg && tg.close) {
        setTimeout(() => tg.close(), 2000);
    }
}
</script>
<!-- PostHog Custom Event Tracking -->
<script>
(function() {
  'use strict';
  if (typeof posthog === 'undefined') return;

  // Track all form submissions
  document.addEventListener('submit', function(e) {
    var form = e.target;
    var formId = form.id || form.getAttribute('name') || 'unknown';
    var source = 'page';
    if (formId === 'elp-popup-form' || formId.indexOf('popup') !== -1) source = 'exit-popup';
    if (formId === 'contactForm') source = 'contact-form';
    if (form.closest && form.closest('#elp-popup-overlay')) source = 'exit-popup';

    posthog.capture('form_submit', {
      form_id: formId,
      source: source,
      page: location.pathname
    });
  }, true);

  // Track calculator usage (if calculator page)
  var calcBtn = document.querySelector('[onclick*="calculate"]');
  if (calcBtn) {
    var origCalculate = window.calculate;
    if (typeof origCalculate === 'function') {
      window.calculate = function() {
        var country = document.getElementById('country');
        var weight = document.getElementById('weight');
        var cargoType = document.getElementById('cargoType');
        posthog.capture('calculator_use', {
          country: country ? country.value : '',
          weight: weight ? weight.value : '',
          cargo_type: cargoType ? cargoType.value : '',
          page: location.pathname
        });
        return origCalculate.apply(this, arguments);
      };
    }
  }

  // Track lead magnet downloads
  document.addEventListener('click', function(e) {
    var link = e.target.closest ? e.target.closest('a') : null;
    if (!link) return;
    var href = link.getAttribute('href') || '';

    // Lead magnet downloads (PDF, guides, etc.)
    if (href.match(/\.(pdf|doc|docx|xlsx)$/i) || href.indexOf('lead-magnet') !== -1 ||
        link.textContent.toLowerCase().indexOf('скачать') !== -1) {
      posthog.capture('lead_magnet_download', {
        url: href,
        text: link.textContent.trim().substring(0, 100),
        page: location.pathname
      });
    }

    // Telegram widget clicks
    if (href.indexOf('t.me') !== -1 || href.indexOf('telegram') !== -1) {
      posthog.capture('tg_widget_click', {
        url: href,
        page: location.pathname
      });
    }
  }, true);

  // Track Telegram toggle chat clicks
  var tgToggle = document.querySelector('[onclick*="toggleChat"]');
  if (tgToggle) {
    tgToggle.addEventListener('click', function() {
      posthog.capture('tg_widget_click', {
        action: 'toggle_chat',
        page: location.pathname
      });
    });
  }

  // Track popup shown (watch for exit popup)
  var popupObserver = new MutationObserver(function(mutations) {
    mutations.forEach(function(m) {
      m.addedNodes.forEach(function(node) {
        if (node.nodeType === 1) {
          var popup = node.querySelector ? node.querySelector('#elp-popup-overlay') : null;
          if (!popup && node.id === 'elp-popup-overlay') popup = node;
          if (popup) {
            posthog.capture('popup_shown', {
              type: 'exit-intent',
              page: location.pathname
            });
          }
        }
      });
    });
  });
  popupObserver.observe(document.body, { childList: true, subtree: true });

})();
</script>
<!-- End PostHog Custom Events -->
</body>
</html>
