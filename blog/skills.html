<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skills Registry — ELP Cargo Admin</title>
<style>
  :root {
    --purple: #8B5CF6;
    --purple-dark: #6D28D9;
    --purple-light: #A78BFA;
    --bg: #0F0F1A;
    --card: #1A1A2E;
    --card-hover: #252540;
    --text: #E5E5F0;
    --text-dim: #9CA3AF;
    --green: #22C55E;
    --yellow: #EAB308;
    --red: #EF4444;
    --blue: #3B82F6;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  .header {
    background: linear-gradient(135deg, var(--purple-dark), var(--purple));
    padding: 24px 32px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 16px;
  }
  .header h1 { font-size: 24px; font-weight: 700; }
  .header .meta { font-size: 14px; opacity: 0.8; }
  .stats-bar {
    display: flex;
    gap: 16px;
    padding: 16px 32px;
    background: var(--card);
    border-bottom: 1px solid #2a2a40;
    flex-wrap: wrap;
  }
  .stat-box {
    background: var(--bg);
    padding: 12px 20px;
    border-radius: 8px;
    min-width: 120px;
    text-align: center;
  }
  .stat-box .num { font-size: 28px; font-weight: 700; color: var(--purple-light); }
  .stat-box .label { font-size: 12px; color: var(--text-dim); margin-top: 4px; }
  .controls {
    padding: 16px 32px;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    align-items: center;
  }
  .search-box {
    flex: 1;
    min-width: 200px;
    max-width: 400px;
    padding: 10px 16px;
    border-radius: 8px;
    border: 1px solid #333;
    background: var(--card);
    color: var(--text);
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-box:focus { border-color: var(--purple); }
  .filter-btn {
    padding: 8px 16px;
    border-radius: 6px;
    border: 1px solid #333;
    background: var(--card);
    color: var(--text-dim);
    cursor: pointer;
    font-size: 13px;
    transition: all 0.2s;
  }
  .filter-btn:hover, .filter-btn.active {
    background: var(--purple);
    color: white;
    border-color: var(--purple);
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 16px;
    padding: 16px 32px 32px;
  }
  .card {
    background: var(--card);
    border-radius: 10px;
    padding: 20px;
    border: 1px solid #2a2a40;
    transition: all 0.2s;
    position: relative;
  }
  .card:hover {
    border-color: var(--purple);
    background: var(--card-hover);
    transform: translateY(-2px);
  }
  .card .name {
    font-size: 16px;
    font-weight: 600;
    color: var(--purple-light);
    margin-bottom: 6px;
  }
  .card .desc {
    font-size: 13px;
    color: var(--text-dim);
    margin-bottom: 12px;
    line-height: 1.4;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .card .meta-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 8px;
  }
  .badge {
    padding: 3px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 500;
  }
  .badge-cat {
    background: rgba(139, 92, 246, 0.2);
    color: var(--purple-light);
  }
  .badge-active { background: rgba(34, 197, 94, 0.2); color: var(--green); }
  .badge-idle { background: rgba(234, 179, 8, 0.2); color: var(--yellow); }
  .badge-dormant { background: rgba(107, 114, 128, 0.2); color: #9CA3AF; }
  .badge-error { background: rgba(239, 68, 68, 0.2); color: var(--red); }
  .badge-library { background: rgba(59, 130, 246, 0.2); color: var(--blue); }
  .badge-int {
    background: rgba(59, 130, 246, 0.15);
    color: var(--blue);
  }
  .card .schedule {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 8px;
  }
  .card .flags {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 4px;
    font-family: monospace;
  }
  .card .last-run {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 6px;
  }
  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    display: inline-block;
    margin-right: 4px;
  }
  .dot-active { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .dot-idle { background: var(--yellow); }
  .dot-dormant { background: #6B7280; }
  .dot-error { background: var(--red); box-shadow: 0 0 6px var(--red); }
  .dot-library { background: var(--blue); }
  .category-header {
    padding: 12px 32px;
    margin-top: 8px;
    font-size: 18px;
    font-weight: 600;
    color: var(--purple-light);
    border-bottom: 1px solid #2a2a40;
    display: none;
  }
  .category-header.visible { display: block; }
  .no-results {
    text-align: center;
    padding: 60px 32px;
    color: var(--text-dim);
    font-size: 16px;
  }
  @media (max-width: 768px) {
    .header, .stats-bar, .controls, .grid { padding-left: 16px; padding-right: 16px; }
    .grid { grid-template-columns: 1fr; }
  }
</style>

</head>
<body>

<div class="header">
  <div>
    <h1>Skills Registry</h1>
    <div class="meta" id="generated">Loading...</div>
  </div>
  <div class="meta">ELP Cargo Admin Dashboard</div>
</div>

<div class="stats-bar" id="stats-bar"></div>

<div class="controls">
  <input type="text" class="search-box" id="search" placeholder="Search skills..." autocomplete="off">
  <button class="filter-btn active" data-filter="all">All</button>
  <button class="filter-btn" data-filter="active">Active</button>
  <button class="filter-btn" data-filter="scheduled">Scheduled</button>
  <button class="filter-btn" data-filter="error">Errors</button>
</div>

<div id="content"></div>

<script>
let registry = null;
let currentFilter = 'all';
let currentSearch = '';

async function loadRegistry() {
  try {
    const resp = await fetch('skills_registry.json?t=' + Date.now());
    registry = await resp.json();
    render();
  } catch(e) {
    document.getElementById('content').innerHTML =
      '<div class="no-results">Failed to load skills_registry.json<br>Run: python3 skills_registry.py</div>';
  }
}

function render() {
  if (!registry) return;
  renderStats();
  renderSkills();
  document.getElementById('generated').textContent =
    'Generated: ' + registry.generated + ' | Total: ' + registry.total;
}

function renderStats() {
  const s = registry.summary;
  const bar = document.getElementById('stats-bar');
  const stats = [
    { num: s.total, label: 'Total Skills' },
    { num: s.active, label: 'Active' },
    { num: s.by_status?.error || 0, label: 'Errors' },
    { num: Object.keys(s.by_category).length, label: 'Categories' },
    { num: Object.keys(s.by_dependency).length, label: 'Dependencies' },
  ];
  bar.innerHTML = stats.map(st =>
    `<div class="stat-box"><div class="num">${st.num}</div><div class="label">${st.label}</div></div>`
  ).join('');
}

function renderSkills() {
  const container = document.getElementById('content');
  let skills = registry.skills.slice();

  // Filter
  if (currentFilter === 'active') skills = skills.filter(s => s.status === 'active');
  else if (currentFilter === 'scheduled') skills = skills.filter(s => s.schedule);
  else if (currentFilter === 'error') skills = skills.filter(s => s.status === 'error');

  // Search
  if (currentSearch) {
    const q = currentSearch.toLowerCase();
    skills = skills.filter(s => {
      const text = [s.name, s.description, s.category, ...(s.dependencies||[]), ...(s.uses||[])].join(' ').toLowerCase();
      return text.includes(q);
    });
  }

  if (skills.length === 0) {
    container.innerHTML = '<div class="no-results">No skills match your criteria</div>';
    return;
  }

  // Group by category
  const groups = {};
  skills.forEach(s => {
    if (!groups[s.category]) groups[s.category] = [];
    groups[s.category].push(s);
  });

  let html = '';
  Object.keys(groups).sort().forEach(cat => {
    html += `<div class="category-header visible">${cat.toUpperCase()} (${groups[cat].length})</div>`;
    html += '<div class="grid">';
    groups[cat].sort((a,b) => a.name.localeCompare(b.name)).forEach(s => {
      html += renderCard(s);
    });
    html += '</div>';
  });

  container.innerHTML = html;
}

function renderCard(s) {
  const statusClass = 'badge-' + s.status;
  const dotClass = 'dot-' + s.status;
  const desc = s.description || '(no description)';
  const schedule = s.schedule ? `<div class="schedule">Schedule: ${s.schedule}</div>` : '';
  const flags = s.flags.length ? `<div class="flags">${s.flags.join(' ')}</div>` : '';
  const lastRun = s.last_run ? `<div class="last-run">Last run: ${s.last_run}</div>` : '';
  const integrations = (s.uses||[]).map(u =>
    `<span class="badge badge-int">${u}</span>`
  ).join('');

  return `
    <div class="card" data-name="${s.name}" data-category="${s.category}" data-status="${s.status}">
      <div class="name"><span class="status-dot ${dotClass}"></span>${s.name}</div>
      <div class="desc">${desc}</div>
      <div class="meta-row">
        <span class="badge badge-cat">${s.category}</span>
        <span class="badge ${statusClass}">${s.status}</span>
        <span class="badge" style="background:rgba(255,255,255,0.05);color:var(--text-dim)">${s.size_kb} KB</span>
        ${integrations}
      </div>
      ${schedule}${flags}${lastRun}
    </div>
  `;
}

// Event listeners
document.getElementById('search').addEventListener('input', e => {
  currentSearch = e.target.value;
  renderSkills();
});

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    renderSkills();
  });
});

// Auto-refresh every 5 minutes
setInterval(loadRegistry, 300000);

// Initial load
loadRegistry();
</script>
<!-- PostHog Custom Event Tracking -->
<script>
(function() {
  'use strict';
  if (typeof posthog === 'undefined') return;

  // Track all form submissions
  document.addEventListener('submit', function(e) {
    var form = e.target;
    var formId = form.id || form.getAttribute('name') || 'unknown';
    var source = 'page';
    if (formId === 'elp-popup-form' || formId.indexOf('popup') !== -1) source = 'exit-popup';
    if (formId === 'contactForm') source = 'contact-form';
    if (form.closest && form.closest('#elp-popup-overlay')) source = 'exit-popup';

    posthog.capture('form_submit', {
      form_id: formId,
      source: source,
      page: location.pathname
    });
  }, true);

  // Track calculator usage (if calculator page)
  var calcBtn = document.querySelector('[onclick*="calculate"]');
  if (calcBtn) {
    var origCalculate = window.calculate;
    if (typeof origCalculate === 'function') {
      window.calculate = function() {
        var country = document.getElementById('country');
        var weight = document.getElementById('weight');
        var cargoType = document.getElementById('cargoType');
        posthog.capture('calculator_use', {
          country: country ? country.value : '',
          weight: weight ? weight.value : '',
          cargo_type: cargoType ? cargoType.value : '',
          page: location.pathname
        });
        return origCalculate.apply(this, arguments);
      };
    }
  }

  // Track lead magnet downloads
  document.addEventListener('click', function(e) {
    var link = e.target.closest ? e.target.closest('a') : null;
    if (!link) return;
    var href = link.getAttribute('href') || '';

    // Lead magnet downloads (PDF, guides, etc.)
    if (href.match(/\.(pdf|doc|docx|xlsx)$/i) || href.indexOf('lead-magnet') !== -1 ||
        link.textContent.toLowerCase().indexOf('скачать') !== -1) {
      posthog.capture('lead_magnet_download', {
        url: href,
        text: link.textContent.trim().substring(0, 100),
        page: location.pathname
      });
    }

    // Telegram widget clicks
    if (href.indexOf('t.me') !== -1 || href.indexOf('telegram') !== -1) {
      posthog.capture('tg_widget_click', {
        url: href,
        page: location.pathname
      });
    }
  }, true);

  // Track Telegram toggle chat clicks
  var tgToggle = document.querySelector('[onclick*="toggleChat"]');
  if (tgToggle) {
    tgToggle.addEventListener('click', function() {
      posthog.capture('tg_widget_click', {
        action: 'toggle_chat',
        page: location.pathname
      });
    });
  }

  // Track popup shown (watch for exit popup)
  var popupObserver = new MutationObserver(function(mutations) {
    mutations.forEach(function(m) {
      m.addedNodes.forEach(function(node) {
        if (node.nodeType === 1) {
          var popup = node.querySelector ? node.querySelector('#elp-popup-overlay') : null;
          if (!popup && node.id === 'elp-popup-overlay') popup = node;
          if (popup) {
            posthog.capture('popup_shown', {
              type: 'exit-intent',
              page: location.pathname
            });
          }
        }
      });
    });
  });
  popupObserver.observe(document.body, { childList: true, subtree: true });

})();
</script>
<!-- End PostHog Custom Events -->
